 !important" class="nodeLabel"><p>Phase 1<br />Coexistence<br />신규 API 골격 추가<br />/api/supa를 호환층으로 연결<br />enqueue 인터페이스 도입</p></span></div></foreignObject></g></g><g class="node default emphasis" id="flowchart-p2-2" transform="translate(690.21875, 95)"><rect class="basic label-container" style="fill:#fff7ed !important;stroke:#ea580c !important;stroke-width:2px !important" x="-130" y="-87" width="260" height="174"/><g class="label" style="color:#111827 !important" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div style="color: rgb(17, 24, 39) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#111827 !important" class="nodeLabel"><p>Phase 2<br />Migration<br />학생 시험 플로우 이전<br />강사 시작/종료/채점 이전<br />RAG, grading을 worker로 이동</p></span></div></foreignObject></g></g><g class="node default phase" id="flowchart-p3-3" transform="translate(985.984375, 95)"><rect class="basic label-container" style="fill:#f8fafc !important;stroke:#94a3b8 !important" x="-115.765625" y="-75" width="231.53125" height="150"/><g class="label" style="color:#0f172a !important" transform="translate(-85.765625, -60)"><rect/><foreignObject width="171.53125" height="120"><div style="color: rgb(15, 23, 42) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#0f172a !important" class="nodeLabel"><p>Phase 3<br />Cleanup<br />레거시 액션 제거 또는 축소<br />동기 AI 경로 제거<br />중복 상태 계산 정리</p></span></div></foreignObject></g></g></g></g></g></svg>