name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint .
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::warning::Skipping build — required secrets not configured"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      - run: npx next build
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  api-integration-test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
      - name: Run API integration tests
        run: |
          mkdir -p test-results
          npx playwright test --project=api-integration --config=e2e/playwright.config.ts
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/api-results.xml
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WO_o0BQXj0V_fMnZXz7cz0yd2V0j2xN7OIRI
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: http://localhost:4010/v1
          ADMIN_USERNAME: test-admin
          ADMIN_PASSWORD: test-password
          ADMIN_SESSION_SECRET: test-secret-for-hmac-signing-minimum-32-chars
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
          TEST_BYPASS_SECRET: e2e-test-bypass-token-2024
          INTERNAL_API_SECRET: test-internal-api-secret-ci
          NEXT_PUBLIC_TEST_BYPASS_ENABLED: "true"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results/api-results.xml

  browser-e2e-test:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-setup
      - name: Run browser E2E tests
        run: |
          mkdir -p test-results
          npx playwright test --project=browser-e2e --project=browser-flows --config=e2e/playwright.config.ts
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/browser-results.xml
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WO_o0BQXj0V_fMnZXz7cz0yd2V0j2xN7OIRI
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: http://localhost:4010/v1
          ADMIN_USERNAME: test-admin
          ADMIN_PASSWORD: test-password
          ADMIN_SESSION_SECRET: test-secret-for-hmac-signing-minimum-32-chars
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
          TEST_BYPASS_SECRET: e2e-test-bypass-token-2024
          INTERNAL_API_SECRET: test-internal-api-secret-ci
          NEXT_PUBLIC_TEST_BYPASS_ENABLED: "true"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-browser
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Test Summary
        if: always()
